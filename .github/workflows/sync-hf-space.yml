name: Sync backend to Hugging Face Space
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Install Python and huggingface_hub
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install huggingface_hub
      - name: Prepare deploy folder
        run: |
          mkdir space_deploy
          cp deploy/space_README.md space_deploy/README.md
          cp Dockerfile start-deploy.sh requirements-deploy.txt celery_app.py space_deploy/
          cp -r api src worker checkpoints training space_deploy/
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              repo_id="obstinix/deeptrace-api",
              repo_type="space",
              folder_path="space_deploy",
              ignore_patterns=["**/__pycache__/**", "**/*.pyc"],
          )
          EOF
