model:
  name: vit_base
  pretrained: true
  num_classes: 2
  dropout: 0.3
  freeze_backbone_epochs: 3

data:
  root_dir: data/frames
  img_size: 224
  batch_size: 16
  num_workers: 4
  val_ratio: 0.15
  test_ratio: 0.10
  seed: 42

training:
  epochs: 30
  optimizer: adamw
  lr: 5.0e-5
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 5
  early_stopping_patience: 6
  gradient_clip: 1.0
  mixed_precision: true
  label_smoothing: 0.05
  use_class_weights: true

logging:
  use_wandb: false
  project: deepfake-recognition
  save_top_k: 3
  checkpoint_dir: checkpoints/vit_base/
