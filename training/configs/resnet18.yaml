# training/configs/resnet18.yaml
model:
  architecture: resnet18
  pretrained: true            # start from ImageNet weights
  num_classes: 2
  dropout: 0.5                # regularisation on the fc head

data:
  train_dir: data/frames/train
  val_dir:   data/frames/val
  test_dir:  data/frames/test
  image_size: 224
  num_workers: 0

training:
  epochs: 50
  batch_size: 32              # reduce to 16 if OOM on 8 GB VRAM
  learning_rate: 1.0e-4       # conservative start for fine-tuning
  weight_decay: 1.0e-4
  scheduler: cosine           # cosine annealing over all epochs
  warmup_epochs: 3
  early_stopping_patience: 8  # stop if val_acc doesn't improve for 8 epochs
  class_weights: auto         # compute from class frequencies at runtime
  mixed_precision: true       # torch.autocast — halves memory, ~30% faster

augmentation:
  # Applied to TRAIN split only
  horizontal_flip: true
  random_crop: true           # 224 from 256 resize
  color_jitter:
    brightness: 0.3
    contrast:   0.3
    saturation: 0.2
    hue:        0.05
  random_erasing: 0.3         # simulates compression artefacts
  normalize:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

logging:
  checkpoint_dir: checkpoints/resnet18
  log_dir:        logs
  save_best_only: true        # only overwrite best.pth if val_acc improves
  eval_report:    logs/eval_report.json
  confusion_matrix: logs/confusion_matrix.png
  roc_curve:        logs/roc_curve.png
