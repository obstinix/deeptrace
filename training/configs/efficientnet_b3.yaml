model:
  name: efficientnet_b3
  pretrained: true
  num_classes: 2
  dropout: 0.35
  freeze_backbone_epochs: 3

data:
  root_dir: data/frames
  img_size: 300
  batch_size: 16
  num_workers: 8
  val_ratio: 0.15
  test_ratio: 0.10
  seed: 42

training:
  epochs: 50
  optimizer: adamw
  lr: 1.5e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 3
  early_stopping_patience: 8
  gradient_clip: 1.0
  mixed_precision: true
  label_smoothing: 0.05
  use_class_weights: true
  gradient_accumulation_steps: 2

logging:
  use_wandb: false
  project: deepfake-recognition
  save_top_k: 3
  checkpoint_dir: checkpoints/efficientnet_b3/
